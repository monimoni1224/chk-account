<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Access Check</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background: #000;
    color: #0f0;
    font-family: "Consolas", "Courier New", monospace;
    padding: 20px;
    font-size: 16px;
  }
  .line {
    opacity: 0;
    animation: show 0.4s forwards;
  }
  @keyframes show {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div id="log"></div>

<script>
const messages = [
  ">> 接続確認中...",
  ">> 認証トークン検証中...",
  ">> 確認完了",
  ">> 接続終了"
];

let index = 0;

function addLine() {
  if (index >= messages.length) return;
  const log = document.getElementById("log");
  const line = document.createElement("div");
  line.className = "line";
  line.style.animationDelay = (index * 0.6) + "s";
  line.textContent = messages[index];
  log.appendChild(line);
  index++;
  setTimeout(addLine, 600);
}

addLine();
</script>

</body>
</html>
