<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Access Check</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    background: #000;
    color: #0f0;
    font-family: "Consolas", "Courier New", monospace;
    padding: 20px;
    font-size: 18px;
    overflow: hidden;
  }

  /* タイピング風（カーソルなし） */
  .line {
    opacity: 0;
    white-space: nowrap;
    overflow: hidden;
    animation: typing 0.25s steps(20, end) forwards;
    border-right: none; /* ← カーソルを完全に消す */
  }

  @keyframes typing {
    from { width: 0; opacity: 1; }
    to { width: 100%; opacity: 1; }
  }

  /* ノイズ背景 */
  .noise {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVQIW2NkYGD4DwABBAEAffNkWQAAAABJRU5ErkJggg==");
    opacity: 0.08;
    animation: noiseMove 0.2s infinite;
  }

  @keyframes noiseMove {
    0% { transform: translate(0,0); }
    50% { transform: translate(-10px,10px); }
    100% { transform: translate(0,0); }
  }
</style>
</head>
<body>

<div class="noise"></div>
<div id="log"></div>

<script>
const messages = [
  ">> 確認中...",
  ">> 碁認完了",
  ">> 接続終了"
];

let index = 0;

function addLine() {
  if (index >= messages.length) return;

  const log = document.getElementById("log");
  const line = document.createElement("div");
  line.className = "line";
  line.style.animationDelay = (index * 0.6) + "s"; // 0.6秒間隔 → 約2秒で完了
  line.textContent = messages[index];

  log.appendChild(line);
  index++;

  setTimeout(addLine, 600);
}

addLine();
</script>

</body>
</html>
